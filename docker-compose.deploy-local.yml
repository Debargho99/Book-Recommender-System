version: "3.8"
services:
  fastapi:
    build:
      context: .
      dockerfile: docker/fastAPI/Dockerfile
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
      - MODEL_PATH=/app/models/collaborative.pkl
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "4000:80"
    depends_on:
      - fastapi
    restart: unless-stopped
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
